name: Build AI Touch Desktop Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name "AITouchDesktop" `
            --icon "assets/icon.ico" `
            --add-data "assets;assets" `
            --hidden-import PIL._tkinter_finder `
            main.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows Installer (Setup.exe)
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload portable EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: AITouchDesktop-Portable-EXE
          path: dist/AITouchDesktop.exe
          retention-days: 30

      - name: Upload Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AITouchDesktop-Setup-Installer
          path: installer_output/AITouchDesktop-Setup.exe
          retention-days: 30

      - name: Create Release (on main branch push)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-build-${{ github.run_number }}
          name: AI Touch Desktop Build ${{ github.run_number }}
          files: |
            installer_output/AITouchDesktop-Setup.exe
            dist/AITouchDesktop.exe
          body: |
            **AITouchDesktop-Setup.exe** — recommended: proper installer with Start Menu + Desktop shortcuts, Uninstall support.
            **AITouchDesktop.exe** — portable version, no installation needed, just run directly.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
